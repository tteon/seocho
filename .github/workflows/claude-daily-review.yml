name: claude-daily-review

on:
  schedule:
    - cron: "0 1 * * *"  # Daily at 01:00 UTC (10:00 KST)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-daily-review
  cancel-in-progress: false

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code review
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are reviewing the SEOCHO codebase for daily maintenance.
            Read CLAUDE.md and AGENTS.md first for project conventions.

            Perform exactly ONE of the following (pick the highest-priority applicable):

            1. **Test gap**: Find an untested public method in seocho/ and add a focused test
            2. **Type safety**: Add missing type hints to a function signature in seocho/
            3. **Doc drift**: Find a docstring that doesn't match current behavior and fix it
            4. **Dead code**: Remove an unused import, function, or variable
            5. **SDK consistency**: Ensure seocho/__init__.py exports match actual module contents

            Rules:
            - Make exactly one cohesive change (not multiple unrelated fixes)
            - Run the relevant test after your change
            - If no safe change exists, report that clearly and make no edits
            - Do not modify generated files, CI configs, or unrelated modules

            After making changes, output a summary in this format:

            ## Change
            - What you changed and why

            ## Validation
            - What you tested

            ## Risk
            - What could go wrong (or "None — safe mechanical change")
          direct_prompt: true
          timeout_minutes: 20

      - name: Create PR from Claude changes
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: daily Claude maintenance review"
          branch: claude/daily-review
          delete-branch: true
          title: "chore: daily Claude maintenance review"
          draft: true
          body: |
            ## Daily Claude Review

            Automated daily maintenance review by Claude.

            ---
            - Workflow: `${{ github.workflow }}`
            - Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Trigger: `${{ github.event_name }}`
