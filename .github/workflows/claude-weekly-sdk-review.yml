name: claude-weekly-sdk-review

on:
  schedule:
    - cron: "0 2 * * 1"  # Every Monday at 02:00 UTC (11:00 KST)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-weekly-sdk-review
  cancel-in-progress: false

jobs:
  claude-sdk-review:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Run Claude Code SDK review
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are performing a weekly SDK architecture review of SEOCHO.
            Read CLAUDE.md and AGENTS.md first for project conventions.

            Focus on the seocho/ Python SDK package. Review these areas in order:

            1. **API surface audit**: Check seocho/__init__.py exports vs actual
               module contents. Flag missing exports or dead exports.

            2. **Ontology consistency**: Verify seocho/ontology.py methods
               (from_jsonld, to_shacl, denormalization_plan, validate_with_shacl)
               work correctly with edge cases. Add a test if you find a gap.

            3. **Prompt strategy quality**: Review seocho/prompt_strategy.py —
               are the generated prompts clear and complete? Suggest one concrete
               improvement if applicable.

            4. **SDK-server parity**: Check if seocho/client.py local mode
               and HTTP mode have equivalent capabilities. Flag gaps.

            5. **Refactor opportunity**: Identify one focused refactor that
               improves code quality without changing behavior.

            Pick the single most impactful item and implement it.

            Rules:
            - One cohesive change per run
            - Run relevant tests after changes
            - Do not touch extraction/ server code (SDK-only scope)
            - Output structured summary

            ## Change
            - What and why

            ## Files Modified
            - List of files

            ## Validation
            - Tests run and results

            ## Next Priority
            - What should be reviewed next week
          direct_prompt: true
          timeout_minutes: 30

      - name: Create PR from Claude SDK review
        if: success()
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "refactor: weekly Claude SDK review"
          branch: claude/weekly-sdk-review
          delete-branch: true
          title: "refactor: weekly Claude SDK architecture review"
          draft: true
          body: |
            ## Weekly SDK Review

            Automated weekly SDK architecture review by Claude.

            ---
            - Workflow: `${{ github.workflow }}`
            - Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - Trigger: `${{ github.event_name }}`
