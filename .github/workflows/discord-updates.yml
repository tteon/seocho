name: Discord Updates

on:
  workflow_run:
    workflows:
      - Basic CI
    types:
      - completed
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      title:
        description: Short update title
        required: false
        default: Manual SEOCHO update
      details:
        description: One-line update body
        required: false
        default: Discord webhook test from GitHub Actions.

permissions:
  contents: read

jobs:
  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    steps:
      - name: Build Discord payload
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          WORKFLOW_RUN_TITLE: ${{ github.event.workflow_run.display_title }}
          WORKFLOW_RUN_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          MANUAL_TITLE: ${{ inputs.title }}
          MANUAL_DETAILS: ${{ inputs.details }}
        run: |
          python - <<'PY' > payload.json
          import json
          import os

          event_name = os.environ["EVENT_NAME"]
          repo = os.environ["REPOSITORY"]
          server_url = os.environ.get("SERVER_URL", "https://github.com")

          if event_name == "workflow_run":
              sha = os.environ.get("WORKFLOW_RUN_SHA", "")
              short_sha = sha[:7] if sha else "unknown"
              title = os.environ.get("WORKFLOW_RUN_TITLE") or "main update"
              url = os.environ.get("WORKFLOW_RUN_URL") or f"{server_url}/{repo}/commit/{sha}"
              content = "\n".join(
                  [
                      "**SEOCHO update**",
                      "",
                      "- Basic CI passed on `main`",
                      f"- Commit `{short_sha}`: {title}",
                      f"- {url}",
                  ]
              )
          elif event_name == "release":
              tag = os.environ.get("RELEASE_TAG") or "release"
              title = os.environ.get("RELEASE_NAME") or tag
              url = os.environ.get("RELEASE_URL") or f"{server_url}/{repo}/releases/tag/{tag}"
              content = "\n".join(
                  [
                      "**SEOCHO release**",
                      "",
                      f"- `{tag}`: {title}",
                      f"- {url}",
                  ]
              )
          else:
              title = os.environ.get("MANUAL_TITLE") or "Manual SEOCHO update"
              details = os.environ.get("MANUAL_DETAILS") or "Discord webhook test from GitHub Actions."
              content = "\n".join(
                  [
                      f"**{title}**",
                      "",
                      f"- {details}",
                      f"- {server_url}/{repo}",
                  ]
              )

          payload = {
              "content": content[:1900],
              "allowed_mentions": {"parse": []},
          }
          print(json.dumps(payload))
          PY

      - name: Send Discord update
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL repository secret is not configured."
            exit 1
          fi

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "$DISCORD_WEBHOOK_URL"
