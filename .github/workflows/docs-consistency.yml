name: docs-consistency

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  docs-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run docs contract checks
        run: bash scripts/ci/check-doc-contracts.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run doc structure / drift checks
        run: python3 scripts/ci/check_doc_structure.py

      - name: Run ADR index validation
        run: python3 scripts/ci/check_adr_index.py
