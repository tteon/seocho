name: Deploy seocho.blog

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
      - "docs/**"
      - "README.md"
      - ".github/workflows/docs-site-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pages-preflight:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Check GitHub Pages availability
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")

          if [ "${status}" = "200" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [ "${status}" = "404" ]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            {
              echo "### GitHub Pages not enabled"
              echo ""
              echo "Skipped deployment because \`${GITHUB_REPOSITORY}\` does not have GitHub Pages enabled yet."
              echo "Enable \`Settings > Pages > Build and deployment > Source: GitHub Actions\` and rerun this workflow to publish \`seocho.blog\`."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          echo "Unexpected GitHub Pages API status: ${status}" >&2
          cat /tmp/pages.json >&2
          exit 1

  build:
    needs: pages-preflight
    if: needs.pages-preflight.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Run website docs checks
        working-directory: website
        run: npm run check:docs

      - name: Build Astro site
        working-directory: website
        run: npm run build

      - name: Check built internal links
        working-directory: website
        run: bash scripts/check-built-links.sh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
