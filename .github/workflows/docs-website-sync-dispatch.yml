name: docs-website-sync-dispatch

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "README.md"
      - "QUICKSTART.md"
      - ".github/workflows/docs-website-sync-dispatch.yml"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch seocho.blog mirror sync
        env:
          SYNC_TOKEN: ${{ secrets.SEOCHO_BLOG_SYNC_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [ -z "${SYNC_TOKEN}" ]; then
            {
              echo "### seocho.blog sync dispatch skipped"
              echo
              echo "Set \`SEOCHO_BLOG_SYNC_TOKEN\` with access to \`tteon/tteon.github.io\` to dispatch the live-site mirror sync immediately after docs changes land on main."
              echo
              echo "The scheduled \`auto-sync-mirrored-docs\` workflow in \`tteon/tteon.github.io\` remains the fallback."
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          payload=$(jq -n \
            --arg source_sha "${SOURCE_SHA}" \
            --arg source_ref "${SOURCE_REF}" \
            '{event_type: "seocho-docs-updated", client_payload: {source_sha: $source_sha, source_ref: $source_ref}}')

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${SYNC_TOKEN}" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            https://api.github.com/repos/tteon/tteon.github.io/dispatches \
            -d "${payload}"
