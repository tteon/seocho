name: integration-e2e

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  e2e-runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start services
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' && secrets.OPENAI_API_KEY || 'dummy-key' }}
          NEO4J_HTTP_PORT: "7474"
          NEO4J_BOLT_PORT: "7687"
          EXTRACTION_API_PORT: "8001"
          EXTRACTION_NOTEBOOK_PORT: "8888"
          CHAT_INTERFACE_PORT: "8501"
        run: |
          docker compose up -d --build

      - name: Run e2e runtime smoke checks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' && secrets.OPENAI_API_KEY || 'dummy-key' }}
          EXTRACTION_API_PORT: "8001"
          CHAT_INTERFACE_PORT: "8501"
        run: |
          bash scripts/integration/e2e_runtime_smoke.sh

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail=200 extraction-service evaluation-interface semantic-service neo4j

      - name: Teardown
        if: always()
        run: |
          docker compose down -v
