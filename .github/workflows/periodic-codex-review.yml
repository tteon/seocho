name: Periodic Codex Review

on:
  schedule:
    - cron: "45 0 * * 1"
  workflow_dispatch:

concurrency:
  group: periodic-codex-review
  cancel-in-progress: false

jobs:
  codex-review:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      pull-requests: read
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SEOCHO_GITHUB_APP_ID: ${{ secrets.SEOCHO_GITHUB_APP_ID }}
      SEOCHO_GITHUB_APP_PRIVATE_KEY: ${{ secrets.SEOCHO_GITHUB_APP_PRIVATE_KEY }}
    steps:
      - name: Check automation secrets
        id: secret_check
        shell: bash
        run: |
          missing=()
          for name in OPENAI_API_KEY SEOCHO_GITHUB_APP_ID SEOCHO_GITHUB_APP_PRIVATE_KEY; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=$(IFS=,; echo "${missing[*]}")" >> "$GITHUB_OUTPUT"
            echo "::notice title=Codex automation skipped::Missing secrets: $(IFS=,; echo "${missing[*]}")"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip review when secrets are absent
        if: steps.secret_check.outputs.ready != 'true'
        shell: bash
        run: |
          echo "Skipping scheduled Codex review because required secrets are not configured."

      - name: Create GitHub App token
        if: steps.secret_check.outputs.ready == 'true'
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.SEOCHO_GITHUB_APP_ID }}
          private-key: ${{ secrets.SEOCHO_GITHUB_APP_PRIVATE_KEY }}

      - name: Check out repository
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app_token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        if: steps.secret_check.outputs.ready == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        if: steps.secret_check.outputs.ready == 'true'
        run: python -m pip install --upgrade uv

      - name: Sync CI dependencies
        if: steps.secret_check.outputs.ready == 'true'
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: uv sync --extra ci

      - name: Run Codex review pass
        if: steps.secret_check.outputs.ready == 'true'
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/periodic-review-pr.md
          output-file: codex-final.md
          sandbox: workspace-write
          model: gpt-5.4

      - name: Detect repository changes
        if: steps.secret_check.outputs.ready == 'true'
        id: changes
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run validation for changed output
        if: steps.changes.outputs.changed == 'true'
        env:
          UV_CACHE_DIR: /tmp/uv-cache
        run: bash scripts/ci/run_basic_ci.sh

      - name: Build PR body
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          if [ -f codex-final.md ]; then
            cp codex-final.md codex-pr-body.md
          else
            printf '%s\n' \
              '## Feature' \
              '- Codex produced one bounded review/refactor change.' \
              '' \
              '## Why' \
              '- Scheduled review found one cohesive improvement worth a draft PR.' \
              '' \
              '## Design' \
              '- See commit diff.' \
              '' \
              '## Expected Effect' \
              '- Small developer-facing improvement or refactor with controlled scope.' \
              '' \
              '## Impact Results' \
              '- Review the diff and CI output.' \
              '' \
              '## Validation' \
              '- `bash scripts/ci/run_basic_ci.sh`' \
              '' \
              '## Risks' \
              '- Residual risk should be reviewed in the diff.' \
              > codex-pr-body.md
          fi
          {
            echo
            echo "## Automation"
            echo "- workflow: periodic-codex-review.yml"
            echo "- validation: \`bash scripts/ci/run_basic_ci.sh\`"
          } >> codex-pr-body.md

      - name: Validate PR body contract
        if: steps.changes.outputs.changed == 'true'
        run: bash scripts/ci/validate_pr_body.sh codex-pr-body.md

      - name: Create or update draft PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          SEOCHO_BOT_BRANCH: codex/periodic-review
          SEOCHO_BOT_COMMIT_MESSAGE: "refactor: codex periodic review"
          SEOCHO_BOT_PR_TITLE: "refactor: codex periodic review"
          SEOCHO_BOT_PR_BODY_FILE: codex-pr-body.md
          SEOCHO_BOT_PR_DRAFT: "true"
          SEOCHO_BOT_GIT_NAME: seocho-codex[bot]
          SEOCHO_BOT_GIT_EMAIL: seocho-codex[bot]@users.noreply.github.com
          SEOCHO_BOT_PR_LABELS: automation,codex,review
        run: bash scripts/ci/create_or_update_bot_pr.sh
