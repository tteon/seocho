name: periodic-codex-review

on:
  schedule:
    - cron: "45 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: periodic-codex-review
  cancel-in-progress: false

jobs:
  codex-periodic-review:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SEOCHO_GITHUB_APP_ID }}
          private-key: ${{ secrets.SEOCHO_GITHUB_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "seocho-codex[bot]"
          git config user.email "seocho-codex[bot]@users.noreply.github.com"

      - name: Run Codex periodic review pass
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/periodic-review-pr.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          effort: high
          allow-bots: true

      - name: Open or update periodic review PR
        id: create_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: periodic Codex review"
          branch: codex/periodic-review
          delete-branch: true
          title: "chore: periodic Codex repository review"
          draft: true
          body: |
            ## Periodic Codex Review

            ${{ steps.run_codex.outputs.final-message }}

            ## Automation Metadata
            - Workflow: `${{ github.workflow }}`
            - Run: `${{ github.run_id }}`
            - Trigger: `${{ github.event_name }}`
            - Actor: `${{ github.actor }}`

      - name: Report PR result
        if: always()
        run: |
          echo "pull-request-operation=${{ steps.create_pr.outputs.pull-request-operation }}"
          echo "pull-request-number=${{ steps.create_pr.outputs.pull-request-number }}"
