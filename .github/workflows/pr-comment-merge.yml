name: pr-comment-merge

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-comment-merge-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  merge-on-go:
    if: github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/go')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SEOCHO_GITHUB_APP_ID }}
          private-key: ${{ secrets.SEOCHO_GITHUB_APP_PRIVATE_KEY }}

      - name: Validate command and reviewer permission
        id: guard
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.issue.number;
            const commenter = context.payload.comment.user.login;
            const command = context.payload.comment.body.trim();

            if (command !== '/go') {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `Merge command ignored. Use exactly \`/go\` to request merge.`,
              });
              core.setFailed(`Unsupported merge command: ${command}`);
              return;
            }

            let permission = 'none';
            try {
              const permissionResponse = await github.rest.repos.getCollaboratorPermissionLevel({
                owner,
                repo,
                username: commenter,
              });
              permission = permissionResponse.data.permission;
            } catch (error) {
              permission = 'none';
            }

            const allowedPermissions = new Set(['admin', 'maintain', 'write']);
            if (!allowedPermissions.has(permission)) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `Merge command ignored. @${commenter} does not have write-level repository permission.`,
              });
              core.setFailed(`Unauthorized merge command from ${commenter}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: issueNumber,
            });

            if (pr.state !== 'open') {
              core.setFailed(`Pull request #${issueNumber} is not open.`);
              return;
            }

            if (pr.draft) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body: `Merge command ignored. Pull request #${issueNumber} is still in draft state.`,
              });
              core.setFailed(`Pull request #${issueNumber} is draft.`);
              return;
            }

            core.setOutput('pull_number', String(issueNumber));
            core.setOutput('commenter', commenter);

      - name: Merge pull request
        id: merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = Number('${{ steps.guard.outputs.pull_number }}');
            const commenter = '${{ steps.guard.outputs.commenter }}';

            try {
              const result = await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pullNumber,
                merge_method: 'squash',
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: `Merged via \`/go\` by @${commenter} using squash merge.`,
              });

              core.setOutput('merged', String(result.data.merged));
              core.setOutput('sha', result.data.sha || '');
            } catch (error) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: `Merge via \`/go\` failed: ${error.message}`,
              });
              core.setFailed(error.message);
            }
