services:
  postgres-memory:
    image: postgres:18-alpine
    ports:
      - "${SEOCHO_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seocho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env before starting memory}
      POSTGRES_DB: ${POSTGRES_DB:-seocho_memory}
    volumes:
      - seocho-postgres-memory-v18:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    restart: unless-stopped
    networks:
      - seocho-memory

volumes:
  seocho-postgres-memory-v18:
    name: ${POSTGRES_VOLUME_NAME:-seocho-postgres-memory-v18}

networks:
  seocho-memory:
    name: seocho-memory
    driver: bridge
