services:
  # --- Core Local Stack: graph DB + runtime API + thin UI proxy ---
  apoc-extended-init:
    image: curlimages/curl:8.10.1
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      APOC_EXTENDED_VERSION: ${APOC_EXTENDED_VERSION:-5.26.4}
      SEOCHO_NEO4J_PLUGIN_DIR: /plugins
    entrypoint: ["/bin/sh", "/setup/install-apoc-extended.sh"]
    volumes:
      - ./scripts/setup:/setup:ro
      - ./data/neo4j/plugins:/plugins
    restart: "no"

  neo4j:
    image: graphstack/dozerdb:5.26.3.0
    container_name: graphrag-neo4j
    ports:
      - "${SEOCHO_BIND_HOST:-127.0.0.1}:${NEO4J_HTTP_PORT:-7474}:7474" # HTTP
      - "${SEOCHO_BIND_HOST:-127.0.0.1}:${NEO4J_BOLT_PORT:-7687}:7687" # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env before starting compose}
      - NEO4J_PLUGINS=["apoc", "n10s"]
      # gds.* serves the MDM demo (examples/mdm/, OpenGDS jar in ./data/neo4j/plugins);
      # keep the list scoped — no wildcard unrestricted (§13). semantics.* is
      # n10s's procedure namespace as installed by NEO4J_PLUGINS.
      # NOTE: config-style env vars MUST use the NEO4J_ prefixed form — the raw
      # dotted keys previously here were silently ignored by the image; the
      # effective values came from the plugin installer's defaults.
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*,semantics.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*,semantics.*,gds.*
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/import:/var/lib/neo4j/import
      - ./data/neo4j/plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    networks:
      - graphrag-net
    depends_on:
      apoc-extended-init:
        condition: service_completed_successfully


  # --- Application Services ---
  extraction-service:
    build:
      context: .
      dockerfile: extraction/Dockerfile
    # No fixed container_name: the app tier runs per-instance (seocho-6q9.3),
    # so compose derives <project>-extraction-service-<n> to avoid collisions.
    ports:
      - "${SEOCHO_BIND_HOST:-127.0.0.1}:${EXTRACTION_NOTEBOOK_PORT:-8888}:8888"
      - "${SEOCHO_BIND_HOST:-127.0.0.1}:${EXTRACTION_API_PORT:-8001}:8001"
    volumes:
      - ./notebooks:/app/notebooks
      - ./demos:/app/demos
    environment:
      # Container-internal hostname. Host-side SDK/scripts should use
      # NEO4J_URI=bolt://localhost:7687 in .env.
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env before starting compose}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SEOCHO_TRACE_BACKEND=${SEOCHO_TRACE_BACKEND:-none}
      - SEOCHO_TRACE_JSONL_PATH=${SEOCHO_TRACE_JSONL_PATH:-/tmp/seocho-runtime.jsonl}
      - SEOCHO_TRACE_OPIK_MODE=${SEOCHO_TRACE_OPIK_MODE:-self_host}
      - OPIK_URL_OVERRIDE=${OPIK_URL:-}
      - OPIK_WORKSPACE=${OPIK_WORKSPACE:-default}
      - OPIK_PROJECT_NAME=${OPIK_PROJECT_NAME:-seocho}
      - OPIK_API_KEY=${OPIK_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - graphrag-net

  evaluation-interface:
    build: ./evaluation
    command: uvicorn server:app --host 0.0.0.0 --port 8501
    ports:
      - "${SEOCHO_BIND_HOST:-127.0.0.1}:${CHAT_INTERFACE_PORT:-8501}:8501"
    volumes:
      - ./evaluation:/app
    environment:
      - EXTRACTION_SERVICE_URL=http://extraction-service:8001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - extraction-service
    networks:
      - graphrag-net


networks:
  graphrag-net:
    # Fixed name so per-instance app projects (docker-compose.instance.yml,
    # seocho-6q9.3) can attach to the shared stack's network as `external`.
    name: seocho-net
    driver: bridge
