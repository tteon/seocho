apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://seocho-prometheus:9090
    isDefault: true
  - name: Tempo
    type: tempo
    access: proxy
    url: http://seocho-tempo:3200
    jsonData:
      tracesToMetrics:
        datasourceUid: prometheus
