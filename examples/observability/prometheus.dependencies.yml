global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/seocho-rules.yml

scrape_configs:
  - job_name: seocho-otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: seocho-postgresql
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: seocho-etcd
    metrics_path: /metrics
    static_configs:
      # Matches the validated local profile. Production deployments should
      # replace this with service discovery for every etcd member.
      - targets: ["host.docker.internal:52379"]

  # DozerDB Community 5.26.3.0 exposes no supported native Prometheus or
  # dynamic TLS-reload endpoint. SEOCHO still emits db.client operation
  # metrics. Add the official server endpoint here only after the deployed
  # edition exposes and authenticates one.
