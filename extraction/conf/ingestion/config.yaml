schema: baseline

dataset:
  path: "${oc.env:BENCHMARK_DATASET_URL,}"
  categories:
    - "Financials"
    - "Company overview"
    - "Legal"
  sample_size: 10

neo4j:
  uri: "${oc.env:NEO4J_URI,bolt://localhost:7687}"
  user: "${oc.env:NEO4J_USER,neo4j}"
  password: "${oc.env:NEO4J_PASSWORD,password}"

openai:
  model: "gpt-4o"
